<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPG OELEON - Super App CBT</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; }
  .glass { background: white; border-radius: 20px; border: 1px solid #e2e8f0; }
  .hidden { display: none; }
  input, select, textarea { border: 1px solid #cbd5e1 !important; border-radius: 8px !important; padding: 10px !important; width: 100%; }
</style>
</head>
<body class="min-h-screen">

<div id="loginPage" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 p-4">
    <div class="glass p-8 w-full max-w-md shadow-2xl text-center">
        <img src="https://raw.githubusercontent.com/wendelinus223-gif/admin-rpgo/main/LOGO.jpg" class="w-20 h-20 mx-auto mb-4 rounded-full border-4 border-white shadow-lg">
        <h2 class="text-2xl font-bold text-slate-800">RPG OELEON</h2>
        <p class="text-sm text-slate-500 mb-6">Login Sistem Ujian</p>
        <div class="space-y-4 text-left">
            <input type="text" id="l_nama" placeholder="Nama Lengkap">
            <input type="password" id="l_pass" placeholder="Password">
            <button onclick="prosesLogin()" id="btnLogin" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 shadow-lg transition">MASUK</button>
        </div>
        <p class="mt-6 text-[10px] text-slate-400 uppercase font-bold tracking-widest italic">Wendelinus Christo Snae, SE</p>
    </div>
</div>

<div id="mainDashboard" class="hidden">
    <nav class="bg-white border-b p-4 sticky top-0 z-40 shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="https://raw.githubusercontent.com/wendelinus223-gif/admin-rpgo/main/LOGO.jpg" class="w-8 h-8 rounded-full">
                <span class="font-bold text-slate-800">OELEON CBT</span>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p id="userNama" class="text-xs font-bold uppercase"></p>
                    <p id="userRole" class="text-[10px] text-blue-500 font-bold uppercase"></p>
                </div>
                <button onclick="location.reload()" class="bg-red-50 text-red-500 px-3 py-1 rounded-lg text-xs font-bold">LOGOUT</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        
        <div id="sectionManajemenAkun" class="hidden mb-8">
            <div class="glass p-6 border-t-4 border-orange-500 shadow-md">
                <h3 class="font-bold mb-4">👥 Manajemen Akun (Khusus Admin)</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                    <input type="text" id="u_nama" placeholder="Nama Lengkap">
                    <select id="u_role"><option value="siswa">Siswa</option><option value="guru">Guru</option></select>
                    <input type="text" id="u_pass" value="RPGO123" readonly class="bg-slate-50">
                    <button onclick="addUser()" class="bg-orange-500 text-white font-bold rounded-xl px-4 py-2">TAMBAH USER</button>
                </div>
                <div class="overflow-x-auto max-h-48">
                    <table class="w-full text-left text-xs">
                        <tbody id="userListTable"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="sectionPublikasiLink" class="hidden mb-8">
            <div class="glass p-6 border-t-4 border-purple-600 shadow-md">
                <h3 class="font-bold mb-4 text-purple-700">🔗 Publikasi & Jadwal Ujian</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                    <input type="text" id="exam_mapel" placeholder="Mata Pelajaran">
                    <select id="exam_kelas"><option>7</option><option>8</option><option>9</option><option>10</option><option>11</option><option>12</option></select>
                    <input type="text" id="exam_link" placeholder="Paste Link G-Form">
                </div>
                <button onclick="saveExam()" class="w-full bg-purple-600 text-white py-3 rounded-xl font-bold">SIMPAN SEBAGAI DRAFT</button>
                <div id="examList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-6"></div>
            </div>
        </div>

        <div id="sectionDaftarUjian" class="hidden">
            <h3 class="text-xl font-bold mb-6 text-slate-700">Daftar Ujian Hari Ini</h3>
            <div id="gridUjianSiswa" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="frameUjianSiswa" class="hidden fixed inset-0 z-50 bg-white p-2">
            <button onclick="tutupUjian()" class="mb-2 bg-slate-800 text-white px-4 py-2 rounded-lg font-bold text-xs uppercase">⬅️ Kembali ke Menu</button>
            <div id="iframeBox" class="h-full"></div>
        </div>

    </main>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, get, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA4_3IPW8BAWmBBSwYei4A7KE1AsLP9C-8",
  authDomain: "guru-rpgo.firebaseapp.com",
  databaseURL: "https://guru-rpgo-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "guru-rpgo",
  storageBucket: "guru-rpgo.firebasestorage.app",
  appId: "1:475490673231:web:a85fccf2eb86e9ace1c03a"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.prosesLogin = async function() {
    const inputNama = document.getElementById("l_nama").value.trim();
    const inputPass = document.getElementById("l_pass").value;

    if(!inputNama || !inputPass) return alert("Isi Nama & Password!");

    if(inputNama === "Wendelinus Christo Snae, SE" && inputPass === "RPGO123") {
        renderMenu("Wendelinus Christo Snae, SE", "admin_super");
        return;
    }

    const snap = await get(ref(db, "users"));
    const found = Object.values(snap.val() || {}).find(u => u.nama === inputNama && u.password === inputPass);

    if(found) {
        renderMenu(found.nama, found.role);
    } else {
        alert("Nama atau Password salah!");
    }
};

function renderMenu(nama, role) {
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("mainDashboard").classList.remove("hidden");
    document.getElementById("userNama").innerText = nama;
    document.getElementById("userRole").innerText = (role === 'admin_super') ? 'ADMIN UTAMA' : role;

    if(role === 'admin_super') {
        document.getElementById("sectionManajemenAkun").classList.remove("hidden");
        document.getElementById("sectionPublikasiLink").classList.remove("hidden");
        loadAdminData();
    } else if(role === 'guru') {
        document.getElementById("sectionPublikasiLink").classList.remove("hidden");
        loadAdminData();
    } else if(role === 'siswa') {
        document.getElementById("sectionDaftarUjian").classList.remove("hidden");
        loadSiswaData();
    }
}

// LOGIKA ADMIN & GURU
function loadAdminData() {
    onValue(ref(db, "users"), snap => {
        let h = ""; Object.entries(snap.val() || {}).forEach(([key, u]) => {
            h += `<tr class="border-b"><td>${u.nama}</td><td>${u.role}</td><td><button onclick="delUser('${key}')" class="text-red-500">Hapus</button></td></tr>`;
        });
        document.getElementById("userListTable").innerHTML = h;
    });

    onValue(ref(db, "daftar_ujian"), snap => {
        let h = ""; Object.entries(snap.val() || {}).forEach(([key, e]) => {
            const isAktif = e.status === 'aktif';
            h += `
            <div class="p-4 bg-white border rounded-xl shadow-sm border-l-4 ${isAktif ? 'border-green-500' : 'border-slate-300'}">
                <p class="font-bold text-xs text-slate-700">${e.mapel}</p>
                <p class="text-[10px] text-slate-400 mb-2 uppercase">Kelas ${e.kelas}</p>
                <div class="flex gap-2">
                    <button onclick="toggleUjian('${key}', '${e.status}')" class="text-[10px] px-3 py-1 rounded font-bold ${isAktif ? 'bg-green-100 text-green-600' : 'bg-slate-100 text-slate-500'}">
                        ${isAktif ? 'AKTIF (Siswa Bisa Lihat)' : 'NON-AKTIF'}
                    </button>
                    <button onclick="delExam('${key}')" class="text-[10px] text-red-500 font-bold ml-auto">HAPUS</button>
                </div>
            </div>`;
        });
        document.getElementById("examList").innerHTML = h;
    });
}

// OPERASI DATABASE
window.addUser = () => push(ref(db, "users"), {nama: document.getElementById("u_nama").value.trim(), role: document.getElementById("u_role").value, password: "RPGO123"});
window.delUser = (k) => confirm("Hapus user?") && remove(ref(db, `users/${k}`));

window.saveExam = () => {
    const m = document.getElementById("exam_mapel").value;
    const l = document.getElementById("exam_link").value;
    if(!m || !l) return alert("Lengkapi data!");
    push(ref(db, "daftar_ujian"), {
        mapel: m, 
        kelas: document.getElementById("exam_kelas").value, 
        link: l, 
        status: "nonaktif" 
    });
    alert("Berhasil disimpan! Klik tombol NON-AKTIF untuk mengaktifkan ujian.");
};

window.toggleUjian = (key, current) => update(ref(db, `daftar_ujian/${key}`), { status: current === 'aktif' ? 'nonaktif' : 'aktif' });
window.delExam = (k) => confirm("Hapus ujian?") && remove(ref(db, `daftar_ujian/${k}`));

// LOGIKA SISWA
function loadSiswaData() {
    onValue(ref(db, "daftar_ujian"), snap => {
        let h = ""; Object.values(snap.val() || {}).forEach(e => {
            if(e.status === 'aktif') {
                h += `
                <div onclick="bukaUjian('${e.link}')" class="glass p-6 cursor-pointer border-l-4 border-blue-600 hover:bg-blue-50 transition">
                    <p class="text-[10px] font-bold text-blue-500 uppercase">Ujian Aktif</p>
                    <h4 class="text-lg font-bold text-slate-800">${e.mapel}</h4>
                    <p class="text-xs text-slate-400 font-semibold uppercase">Kelas ${e.kelas}</p>
                </div>`;
            }
        });
        document.getElementById("gridUjianSiswa").innerHTML = h || "<div class='col-span-full p-10 text-center text-slate-400 italic'>Belum ada ujian aktif untuk jam ini.</div>";
    });
}

window.bukaUjian = (url) => {
    document.getElementById("frameUjianSiswa").classList.remove("hidden");
    document.getElementById("iframeBox").innerHTML = `<iframe src="${url}?embedded=true" class="w-full h-[90vh] border-0"></iframe>`;
};
window.tutupUjian = () => confirm("Pastikan sudah klik SUBMIT/KIRIM di G-Form. Keluar?") && (document.getElementById("frameUjianSiswa").classList.add("hidden"));
</script>
</body>
</html>
