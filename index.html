<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPG OELEON - CBT Lintas Jenjang</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; }
  .glass { background: white; border-radius: 20px; border: 1px solid #e2e8f0; }
  .hidden { display: none; }
  input, select, textarea { border: 1px solid #cbd5e1 !important; border-radius: 8px !important; padding: 10px !important; width: 100%; font-size: 14px; }
  
  /* Kamera Melayang */
  #cam-container { position: fixed; bottom: 20px; right: 20px; width: 110px; height: 110px; border-radius: 50%; overflow: hidden; border: 3px solid #2563eb; z-index: 100; background: #000; display: none; }
  #cam-video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

  /* Perbaikan Style Cetak */
  @media print {
    body * { visibility: hidden; }
    #printArea, #printArea * { visibility: visible; }
    #printArea { position: absolute; left: 0; top: 0; width: 100%; display: block !important; }
    .card-print { 
        page-break-inside: avoid; 
        box-shadow: none !important;
        margin-bottom: 20px !important;
    }
  }
</style>
</head>
<body class="min-h-screen">

<div id="loginPage" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 p-4">
    <div class="glass p-8 w-full max-w-md shadow-2xl text-center">
        <img src="https://raw.githubusercontent.com/wendelinus223-gif/admin-rpgo/main/LOGO.jpg" class="w-20 h-20 mx-auto mb-4 rounded-full border-4 border-white shadow-lg">
        <h2 class="text-2xl font-bold text-slate-800 uppercase">RPG OELEON</h2>
        <p class="text-sm text-slate-500 mb-6 font-semibold">CBT SD • SMP • SMA</p>
        <div class="space-y-4 text-left">
            <input type="text" id="l_no" placeholder="Username / No. Peserta">
            <input type="password" id="l_pass" placeholder="Password">
            <button onclick="prosesLogin()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 shadow-lg transition uppercase tracking-wider">Masuk Sistem</button>
        </div>
        <p class="mt-6 text-[10px] text-slate-400 uppercase font-bold tracking-widest italic">Wendelinus Christo Snae, SE</p>
    </div>
</div>

<div id="mainDashboard" class="hidden">
    <nav class="bg-white border-b p-4 sticky top-0 z-40 shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <img src="https://raw.githubusercontent.com/wendelinus223-gif/admin-rpgo/main/LOGO.jpg" class="w-8 h-8 rounded-full">
                <span class="font-bold text-slate-800 hidden md:block">OELEON CBT SYSTEM</span>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p id="userNama" class="text-xs font-bold uppercase"></p>
                    <p id="userLembaga" class="text-[10px] text-blue-600 font-bold uppercase"></p>
                </div>
                <button onclick="location.reload()" class="bg-red-100 text-red-600 px-3 py-1 rounded-lg text-xs font-bold">KELUAR</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4">
        <div id="adminSection" class="hidden space-y-6">
            <div class="glass p-6 border-t-4 border-blue-600 shadow-md">
                <h3 class="font-bold mb-4 flex items-center gap-2">👥 Manajemen Biodata Peserta</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-3">
                    <select id="s_lembaga">
                        <option value="SD">TINGKAT SD</option>
                        <option value="SMP">TINGKAT SMP</option>
                        <option value="SMA">TINGKAT SMA</option>
                    </select>
                    <input type="text" id="s_no" placeholder="No. Peserta">
                    <input type="text" id="s_nama" placeholder="Nama Lengkap">
                    <input type="text" id="s_pass" placeholder="Password">
                    <input type="text" id="s_foto" placeholder="Link Foto (Opsional)">
                    <button onclick="addSiswa()" class="bg-blue-600 text-white font-bold rounded-lg px-4 py-2 hover:bg-blue-700 transition">SIMPAN</button>
                </div>
                <div class="mt-8 flex justify-between items-center bg-slate-50 p-4 rounded-xl">
                    <h4 class="font-bold text-sm text-slate-700 uppercase">Daftar Seluruh Peserta</h4>
                    <button onclick="printKartu()" class="bg-emerald-600 text-white px-5 py-2 rounded-xl text-xs font-bold uppercase shadow-md hover:bg-emerald-700 transition">🖨️ Cetak Kartu</button>
                </div>
                <div class="overflow-x-auto mt-4 max-h-72">
                    <table class="w-full text-xs text-left">
                        <thead class="bg-slate-200 uppercase sticky top-0">
                            <tr><th class="p-3">Lembaga</th><th class="p-3">No. Peserta</th><th class="p-3">Nama</th><th class="p-3">Pass</th><th class="p-3">Foto</th><th class="p-3">Aksi</th></tr>
                        </thead>
                        <tbody id="listSiswaTable"></tbody>
                    </table>
                </div>
            </div>

            <div class="glass p-6 border-t-4 border-purple-600 shadow-md">
                <h3 class="font-bold mb-4 flex items-center gap-2">🔗 Publikasi Link Google Form</h3>
                <div class="grid grid-cols-1 md:grid-cols-5 gap-3">
                    <select id="exam_lembaga">
                        <option value="SD">TARGET SD</option>
                        <option value="SMP">TARGET SMP</option>
                        <option value="SMA">TARGET SMA</option>
                    </select>
                    <input type="text" id="exam_kelas" placeholder="Kelas (Contoh: 6, 9, atau 12)">
                    <input type="text" id="exam_mapel" placeholder="Mata Pelajaran">
                    <input type="text" id="exam_link" placeholder="Link G-Form">
                    <button onclick="saveExam()" class="bg-purple-600 text-white font-bold rounded-lg px-4 py-2">PUBLISH</button>
                </div>
                <div id="adminExamList" class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-6"></div>
            </div>
        </div>

        <div id="siswaSection" class="hidden">
            <h3 class="text-xl font-bold mb-6 text-slate-700 border-b pb-3">Daftar Ujian Tersedia</h3>
            <div id="gridUjianSiswa" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="frameUjian" class="hidden fixed inset-0 z-50 bg-white">
            <div class="bg-slate-900 p-3 flex justify-between items-center">
                <span class="text-white font-bold text-xs uppercase" id="mapelAktif">...</span>
                <button onclick="tutupUjian()" class="bg-red-600 text-white px-6 py-1 rounded-full font-bold text-xs uppercase">Selesai</button>
            </div>
            <div id="iframeBox" class="h-full"></div>
        </div>
    </main>
</div>

<div id="cam-container"><video id="cam-video" autoplay playsinline muted></video></div>
<div id="printArea" class="hidden"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, get, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyA4_3IPW8BAWmBBSwYei4A7KE1AsLP9C-8",
    authDomain: "guru-rpgo.firebaseapp.com",
    databaseURL: "https://guru-rpgo-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "guru-rpgo",
    storageBucket: "guru-rpgo.firebasestorage.app",
    appId: "1:475490673231:web:a85fccf2eb86e9ace1c03a"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.prosesLogin = async function() {
    const no = document.getElementById("l_no").value.trim().toUpperCase();
    const ps = document.getElementById("l_pass").value;
    if(no === "AMADEO" && ps === "RPGO123") {
        renderUI("WENDELINUS CHRISTO SNAE, SE", "ADMIN UTAMA", "admin");
        return;
    }
    const snap = await get(ref(db, "siswa_cbt"));
    let found = null;
    Object.values(snap.val() || {}).forEach(s => {
        if(s.noPeserta.toUpperCase() === no && s.password === ps) found = s;
    });
    if(found) { renderUI(found.nama, found.lembaga, "siswa"); } 
    else { alert("Akses Ditolak!"); }
};

function renderUI(nama, lembaga, role) {
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("mainDashboard").classList.remove("hidden");
    document.getElementById("userNama").innerText = nama;
    document.getElementById("userLembaga").innerText = lembaga;
    if(role === "admin") {
        document.getElementById("adminSection").classList.remove("hidden");
        loadAdminData();
    } else {
        document.getElementById("siswaSection").classList.remove("hidden");
        loadSiswaData(lembaga);
    }
}

window.addSiswa = () => {
    const data = {
        lembaga: document.getElementById("s_lembaga").value,
        noPeserta: document.getElementById("s_no").value.trim(),
        nama: document.getElementById("s_nama").value.trim(),
        password: document.getElementById("s_pass").value.trim(),
        foto: document.getElementById("s_foto").value.trim() || ""
    };
    if(!data.noPeserta || !data.nama) return alert("Isi lengkap!");
    push(ref(db, "siswa_cbt"), data);
    alert("Berhasil!");
    document.getElementById("s_no").value = "";
    document.getElementById("s_nama").value = "";
    document.getElementById("s_pass").value = "";
    document.getElementById("s_foto").value = "";
};

function loadAdminData() {
    onValue(ref(db, "siswa_cbt"), snap => {
        let h = ""; 
        Object.entries(snap.val() || {}).forEach(([key, s]) => {
            h += `<tr class="border-b">
                <td class="p-3 font-bold text-blue-600">${s.lembaga}</td>
                <td class="p-3 font-mono">${s.noPeserta}</td>
                <td class="p-3">${s.nama}</td>
                <td class="p-3">${s.password}</td>
                <td class="p-3 text-[10px] truncate max-w-[100px]">${s.foto ? 'Ada Foto' : '-'}</td>
                <td class="p-3"><button onclick="delSiswa('${key}')" class="text-red-500">Hapus</button></td>
            </tr>`;
        });
        document.getElementById("listSiswaTable").innerHTML = h;
    });
    onValue(ref(db, "soal_cbt"), snap => {
        let h = "";
        Object.entries(snap.val() || {}).forEach(([key, e]) => {
            const isAktif = e.status === 'aktif';
            h += `<div class="p-4 bg-white border rounded-2xl shadow-sm border-l-4 ${isAktif ? 'border-green-500' : 'border-slate-300'}">
                <p class="text-[10px] font-bold text-slate-400 uppercase">${e.lembaga} - KELAS ${e.kelas || '-'}</p>
                <p class="font-bold text-sm">${e.mapel}</p>
                <div class="flex gap-2 mt-4">
                    <button onclick="toggleExam('${key}', '${e.status}')" class="text-[10px] px-3 py-1 rounded-full font-bold ${isAktif ? 'bg-green-100 text-green-600' : 'bg-slate-100 text-slate-500'}">
                        ${isAktif ? 'AKTIF' : 'NONAKTIF'}
                    </button>
                    <button onclick="delExam('${key}')" class="text-[10px] text-red-500 font-bold ml-auto">HAPUS</button>
                </div>
            </div>`;
        });
        document.getElementById("adminExamList").innerHTML = h;
    });
}

window.delSiswa = (k) => confirm("Hapus?") && remove(ref(db, `siswa_cbt/${k}`));
window.delExam = (k) => confirm("Hapus?") && remove(ref(db, `soal_cbt/${k}`));
window.toggleExam = (key, cur) => update(ref(db, `soal_cbt/${key}`), { status: cur === 'aktif' ? 'nonaktif' : 'aktif' });

window.saveExam = () => {
    const data = {
        lembaga: document.getElementById("exam_lembaga").value,
        kelas: document.getElementById("exam_kelas").value.trim(), // Data Kelas Baru
        mapel: document.getElementById("exam_mapel").value,
        link: document.getElementById("exam_link").value,
        status: "nonaktif"
    };
    if(!data.mapel || !data.link) return alert("Lengkapi data ujian!");
    push(ref(db, "soal_cbt"), data);
    alert("Diterbitkan!");
    document.getElementById("exam_kelas").value = "";
    document.getElementById("exam_mapel").value = "";
    document.getElementById("exam_link").value = "";
};

// --- FUNGSI CETAK KARTU (DENGAN FOTO) ---
window.printKartu = async () => {
    const snap = await get(ref(db, "siswa_cbt"));
    let html = "";
    Object.values(snap.val() || {}).forEach(s => {
        html += `
        <div class="card-print" style="border: 2px solid #000; padding: 10px; width: 48%; float: left; margin: 1%; height: 280px; box-sizing: border-box; position: relative; font-family: Arial, sans-serif; background: #fff; margin-bottom: 20px;">
            <div style="display: flex; align-items: center; justify-content: center; border-bottom: 4px double #000; padding-bottom: 5px; margin-bottom: 10px;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/9/9c/Logo_Tut_Wuri_Handayani.png" style="width: 45px; position: absolute; left: 10px; top: 10px;">
                <div style="text-align: center; margin-left: 40px;">
                    <div style="font-size: 12px; font-weight: bold; letter-spacing: 1px;">KARTU PESERTA PSAJ</div>
                    <div style="font-size: 11px; font-weight: bold;">TAHUN PELAJARAN 2025/2026</div>
                </div>
            </div>
            <table style="font-size: 10px; width: 100%; border-collapse: collapse; font-weight: bold;">
                <tr><td width="35%" style="padding:3px 0;">NO. PESERTA</td><td width="5%">:</td><td>${s.noPeserta}</td></tr>
                <tr><td style="padding:3px 0;">NAMA</td><td>:</td><td style="text-transform: uppercase;">${s.nama}</td></tr>
                <tr><td style="padding:3px 0;">LEMBAGA</td><td>:</td><td>${s.lembaga} RPG OELEON</td></tr>
                <tr><td style="padding:3px 0;">PASSWORD</td><td>:</td><td style="background: #eee; padding: 2px;">${s.password}</td></tr>
            </table>
            <div style="margin-top: 15px; display: flex; justify-content: space-between; align-items: flex-start;">
                <div style="width: 65px; height: 85px; border: 1px solid #000; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #fafafa;">
                    ${s.foto ? 
                        `<img src="${s.foto}" style="width: 100%; height: 100%; object-fit: cover;">` : 
                        `<div style="font-size: 8px; text-align: center; color: #000; font-weight:bold;">FOTO<br>3x4</div>`
                    }
                </div>
                <div style="text-align: center; width: 160px;">
                    <div style="font-size: 9px; font-weight: bold;">OELEON, 21 MEI 2026</div>
                    <div style="font-size: 9px; font-weight: bold; margin-bottom: 35px;">KEPALA SEKOLAH</div>
                    <div style="font-size: 9px; font-weight: bold; text-decoration: underline;">YASINTHA TUALAKA, S.Pd</div>
                    <div style="font-size: 9px; font-weight: bold;">Nip. -</div>
                </div>
            </div>
            <div style="position: absolute; bottom: 5px; right: 10px; font-size: 7px; color: #666; font-style: italic;">
                RPG OELEON CBT SYSTEM
            </div>
        </div>`;
    });
    const printArea = document.getElementById("printArea");
    printArea.innerHTML = html;
    printArea.classList.remove("hidden");
    window.print();
    printArea.classList.add("hidden");
};

function loadSiswaData(lembSiswa) {
    onValue(ref(db, "soal_cbt"), snap => {
        let h = ""; 
        Object.values(snap.val() || {}).forEach(e => {
            // Filter: Hanya tampilkan soal yang statusnya 'aktif' DAN lembaganya cocok dengan siswa
            if(e.status === 'aktif' && e.lembaga === lembSiswa) {
                h += `<div onclick="bukaUjian('${e.link}', '${e.mapel}')" class="glass p-6 cursor-pointer border-l-4 border-blue-600">
                    <p class="text-[10px] font-bold text-blue-500 uppercase">${e.lembaga} - KELAS ${e.kelas || ''}</p>
                    <h4 class="text-xl font-bold">${e.mapel}</h4>
                    <p class="text-xs text-slate-400 mt-1">Klik untuk mulai ujian</p>
                </div>`;
            }
        });
        document.getElementById("gridUjianSiswa").innerHTML = h || "<p class='p-8 text-slate-400'>Belum ada ujian aktif untuk lembaga Anda.</p>";
    });
}

window.bukaUjian = async (url, mapel) => {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        document.getElementById('cam-video').srcObject = stream;
        document.getElementById('cam-container').style.display = 'block';
        document.getElementById("mapelAktif").innerText = mapel;
        document.getElementById("frameUjian").classList.remove("hidden");
        document.getElementById("iframeBox").innerHTML = `<iframe src="${url}?embedded=true" class="w-full h-full border-0"></iframe>`;
    } catch (e) { alert("Wajib izin kamera untuk memulai ujian!"); }
};

window.tutupUjian = () => {
    if(confirm("Apakah Anda yakin telah menyelesaikan ujian ini?")) {
        const v = document.getElementById('cam-video');
        if(v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
        document.getElementById('cam-container').style.display = 'none';
        document.getElementById("frameUjian").classList.add("hidden");
    }
};
</script>
</body>
</html>
